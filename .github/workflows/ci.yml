name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Node ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        node-version:
          - 20
          - 24

    defaults:
      run:
        working-directory: csreview

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: csreview/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Run typecheck
        run: npm run typecheck

      - name: Audit dependencies
        run: npm audit --audit-level=low

      - name: Verify package contents
        run: npm pack --dry-run

  self-scan:
    name: Self-scan (dogfood, --fail-on high)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: csreview/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: csreview

      - name: Install Semgrep
        run: python -m pip install --upgrade semgrep

      - name: Run CSReview against its own repository
        run: node csreview/src/cli.js . --agent-name ci --no-update-check --fail-on high
