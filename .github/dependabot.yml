version: 2

updates:
  - package-ecosystem: npm
    directory: /csreview
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Sao_Paulo
    groups:
      npm-runtime:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: America/Sao_Paulo
